<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBF3E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5E9CF;stop-opacity:1" />
    </linearGradient>
    <filter id="catShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Subtle background elements -->
  <circle cx="150" cy="100" r="60" fill="#FF6B35" opacity="0.06"/>
  <circle cx="1050" cy="550" r="80" fill="#5C8D89" opacity="0.08"/>
  
  <!-- Cat head group (left side) -->
  <g transform="translate(250, 315)" filter="url(#catShadow)">
    <!-- Main head -->
    <circle cx="0" cy="0" r="100" fill="#FBF3E2" stroke="#2B1810" stroke-width="1.5"/>
    
    <!-- Left ear -->
    <ellipse cx="-45" cy="-95" rx="28" ry="55" fill="#FBF3E2" stroke="#2B1810" stroke-width="1.2"/>
    <ellipse cx="-45" cy="-88" rx="16" ry="35" fill="#FF6B35" opacity="0.5"/>
    
    <!-- Right ear -->
    <ellipse cx="45" cy="-95" rx="28" ry="55" fill="#FBF3E2" stroke="#2B1810" stroke-width="1.2"/>
    <ellipse cx="45" cy="-88" rx="16" ry="35" fill="#FF6B35" opacity="0.5"/>
    
    <!-- Left eye white -->
    <ellipse cx="-30" cy="-15" rx="18" ry="24" fill="white" stroke="#2B1810" stroke-width="1.2"/>
    <!-- Left pupil -->
    <circle cx="-30" cy="-12" r="12" fill="#2B1810"/>
    <circle cx="-25" cy="-18" r="4" fill="white"/>
    
    <!-- Right eye white -->
    <ellipse cx="30" cy="-15" rx="18" ry="24" fill="white" stroke="#2B1810" stroke-width="1.2"/>
    <!-- Right pupil -->
    <circle cx="30" cy="-12" r="12" fill="#2B1810"/>
    <circle cx="35" cy="-18" r="4" fill="white"/>
    
    <!-- Nose -->
    <path d="M 0 15 L -7 28 L 7 28 Z" fill="#FF6B35" stroke="#2B1810" stroke-width="0.8"/>
    
    <!-- Mouth -->
    <path d="M 0 28 Q -15 40 -28 36" stroke="#2B1810" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 0 28 Q 15 40 28 36" stroke="#2B1810" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Left whiskers -->
    <line x1="-55" y1="-8" x2="-110" y2="-18" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-55" y1="8" x2="-115" y2="20" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-55" y1="25" x2="-110" y2="38" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Right whiskers -->
    <line x1="55" y1="-8" x2="110" y2="-18" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="55" y1="8" x2="115" y2="20" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="55" y1="25" x2="110" y2="38" stroke="#2B1810" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Text section (right side) -->
  <g>
    <!-- Main title - Balaio de -->
    <text x="580" y="180" font-family="'Caprasimo', serif" font-size="92" font-weight="bold" fill="#2B1810" letter-spacing="-1">
      Balaio de
    </text>
    
    <!-- Main title - Gatos (highlighted) -->
    <text x="580" y="280" font-family="'Caprasimo', serif" font-size="92" font-weight="bold" fill="#FF6B35" letter-spacing="-1">
      Gatos
    </text>
    
    <!-- Subtitle -->
    <text x="580" y="360" font-family="'Sora', sans-serif" font-size="44" font-weight="500" fill="#2B1810">
      Métricas de ML
    </text>
    
    <!-- Tagline -->
    <text x="580" y="415" font-family="'Sora', sans-serif" font-size="32" font-weight="400" fill="#5C8D89">
      para Escola da Nuvem
    </text>
  </g>
  
  <!-- Small decorative paw (very subtle) -->
  <g transform="translate(1000, 520)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="12" ry="15" fill="#FF6B35"/>
    <ellipse cx="-25" cy="-15" rx="8" ry="11" fill="#FF6B35" transform="rotate(-30 -25 -15)"/>
    <ellipse cx="0" cy="-28" rx="8" ry="11" fill="#FF6B35"/>
    <ellipse cx="25" cy="-15" rx="8" ry="11" fill="#FF6B35" transform="rotate(30 25 -15)"/>
  </g>
</svg>